#此类配置可以在命令行模式中输入show-options -g查询 


#此类设置可以在命令行模式中输入show-window-options -g查询 
                                    
set -g status-fg yellow
set-option -g mouse-select-pane on  #鼠标可以选中窗格
set-window-option -g mode-mouse on  #鼠标滚轮可以用


#
# author   : Lu Yiming <luyimingchn@gmail.com>
# modified : 2016 May 19
#

bind d source-file ~/dotfiles/tmux/layout

#-- base settings --#
set -g default-terminal "screen-256color"
set -g display-time 3000
set -g escape-time 0
set -g history-limit 65535
set -g base-index 1
set -g pane-base-index 1

#-- bindkeys --#
# prefix key (Ctrl+a)
set -g prefix ^a
unbind ^b
bind a send-prefix

# split window
unbind '"'
# vertical split (prefix -)
bind - splitw -v
unbind %
bind | splitw -h # horizontal split (prefix |)

# select pane
bind k selectp -U # above (prefix k)
bind j selectp -D # below (prefix j)
bind h selectp -L # left (prefix h)
bind l selectp -R # right (prefix l)

# resize pane
bind -r ^k resizep -U 10 # upward (prefix Ctrl+k)
bind -r ^j resizep -D 10 # downward (prefix Ctrl+j)
bind -r ^h resizep -L 10 # to the left (prefix Ctrl+h)
bind -r ^l resizep -R 10 # to the right (prefix Ctrl+l)

# swap pane
# swap with the previous pane (prefix Ctrl+u)
bind ^u swapp -U
# swap with the next pane (prefix Ctrl+d)
bind ^d swapp -D

# misc
# select the last pane (prefix e)
bind e lastp
# select the last window (prefix Ctrl+e)
bind ^e last
# kill pane (prefix q)
bind q killp
# kill window (prefix Ctrl+q)
bind ^q killw


# zoom pane <-> window
#http://tmux.svn.sourceforge.net/viewvc/tmux/trunk/examples/tmux-zoom.sh
bind ^z run "tmux-zoom"

# app
# htop (prefix !)
bind ! splitw htop
# man (prefix m)
bind m command-prompt "splitw 'exec man %%'"

# reload config (prefix r)
bind r source ~/.tmux.conf \; display "Configuration reloaded!"

#-- statusbar --#
set -g status-utf8 on
set -g status-interval 1
set -g status-keys vi

setw -g mode-keys vi


#-- colorscheme --#
#https://github.com/daethorian/conf-tmux/blob/master/colors/zenburn.conf


#-- statusbar --#

set -g status-justify centre
set -g status-position top
set -g status-left "#[fg=yellow]s#S:w#I.p#P#[default]"
set -g status-left-attr bright
set -g status-left-length 20

set -g status-utf8 on
set -g status-interval 1

set -g visual-activity on
setw -g monitor-activity on

setw -g automatic-rename off

# default statusbar colors
set -g status-bg colour235
set -g status-fg yellow
set -g status-attr default

# default window title colors
setw -g window-status-fg colour015
setw -g window-status-bg default
    
# active window title colors
setw -g window-status-current-fg colour009
setw -g window-status-current-bg default
setw -g window-status-current-attr bright

# pane border
set -g pane-active-border-fg colour014     # colour164
set -g pane-active-border-fg colour164
set -g pane-border-fg '#555555'

# message text
set -g message-bg colour235 #base02
set -g message-fg colour166 #orange

# pane number display
set -g display-panes-active-colour colour33 #blue
set -g display-panes-colour colour166 #orange

# clock
setw -g clock-mode-colour colour014

